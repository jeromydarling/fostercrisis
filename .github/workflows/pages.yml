name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_churches:
        description: Force-refresh churches (ignore cache)
        type: boolean
        default: false
  # Daily refresh at 05:00 UTC (midnight US East) so the feeds under
  # the map (waiting-child videos, podcast episodes, advocacy news)
  # stay current without anyone pushing a commit.
  schedule:
    - cron: '0 5 * * *'

# Single concurrent deploy per ref; in-progress runs are cancelled when a
# newer one arrives so the live site always reflects the latest commit.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Project Pages at https://<user>.github.io/<repo>/ — Vite needs this
      # prefix so asset URLs resolve correctly under the subpath.
      VITE_BASE: /${{ github.event.repository.name }}/
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fail fast if Mapbox token is missing
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "::error::Missing repo secret VITE_MAPBOX_TOKEN."
            echo "Add it at Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - run: npm ci

      # Small datasets — refresh on every deploy.
      - name: Refresh SAIPE (county child poverty)
        run: npm run data:saipe
        continue-on-error: true

      - name: Refresh CDC overdose (county)
        run: npm run data:cdc
        continue-on-error: true

      - name: Refresh County Health Rankings
        run: npm run data:chr
        continue-on-error: true

      - name: Refresh ACS (population + disability)
        run: npm run data:acs
        continue-on-error: true

      # Churches (~200k OSM points, ~30 MB). Cache between runs so we
      # only hit Overpass on the first deploy and on forced refreshes.
      # Bump the cache key suffix (`-v1`) to invalidate without UI access.
      - name: Restore churches cache
        id: churches-cache
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.refresh_churches) }}
        uses: actions/cache@v4
        with:
          path: public/data/churches.geojson
          key: churches-osm-v1

      - name: Refresh churches (Overpass → HIFLD)
        if: ${{ steps.churches-cache.outputs.cache-hit != 'true' }}
        run: npm run data:churches
        continue-on-error: true
        timeout-minutes: 30

      # Compose the misery index from whatever fetchers succeeded.
      - name: Build misery index
        run: npm run data:misery
        continue-on-error: true

      # Content feeds (YouTube RSS + podcast RSS). Cheap, ~100-200 KB
      # output; refreshed on every deploy and on the daily cron.
      - name: Refresh content feeds
        run: npm run data:feeds
        continue-on-error: true

      - run: npm run build

      - name: Add .nojekyll so Pages serves _vite-generated files
        run: touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
