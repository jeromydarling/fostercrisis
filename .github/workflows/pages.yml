name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_churches:
        description: Force-refresh churches (ignore cache)
        type: boolean
        default: false
  # Daily refresh at 05:00 UTC (midnight US East) so the feeds under
  # the map (waiting-child videos, podcast episodes, advocacy news)
  # stay current without anyone pushing a commit.
  schedule:
    - cron: '0 5 * * *'

# Single concurrent deploy per ref; in-progress runs are cancelled when a
# newer one arrives so the live site always reflects the latest commit.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # The CNAME file is in public/ so the custom domain is wired, but
      # DNS may still be propagating — so we keep the base as the repo
      # subpath until fostercrisis.com is fully live. Flip to "/" once
      # the custom domain resolves and HTTPS is provisioned.
      VITE_BASE: /${{ github.event.repository.name }}/
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fail fast if Mapbox token is missing
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "::error::Missing repo secret VITE_MAPBOX_TOKEN."
            echo "Add it at Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - run: npm ci

      # Small datasets — refresh on every deploy.
      - name: Refresh SAIPE (county child poverty)
        run: npm run data:saipe
        continue-on-error: true

      - name: Refresh CDC overdose (county)
        run: npm run data:cdc
        continue-on-error: true

      - name: Refresh County Health Rankings
        run: npm run data:chr
        continue-on-error: true

      - name: Refresh ACS (population + disability)
        run: npm run data:acs
        continue-on-error: true

      - name: Refresh EPA EJScreen (pollution)
        run: npm run data:ejscreen
        continue-on-error: true

      # Churches — OSM Overpass is flaky under load, so we split the
      # cache into restore + save and the fetcher is resume-aware:
      # every run RESTORES the latest partial file, only re-fetches
      # states below the 30-feature floor, then SAVES back under a
      # run-unique key. Successive runs converge toward full 51-state
      # coverage without anyone having to delete the cache.
      - name: Restore churches cache (latest partial)
        id: churches-restore
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.refresh_churches) }}
        uses: actions/cache/restore@v4
        with:
          path: public/data/churches.geojson
          key: churches-osm-${{ github.run_id }}
          restore-keys: |
            churches-osm-

      - name: Force-refresh reset
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_churches }}
        run: rm -f public/data/churches.geojson

      - name: Refresh / patch churches (Overpass → HIFLD)
        run: npm run data:churches
        continue-on-error: true
        timeout-minutes: 30

      # Save whatever the fetcher produced — partial or complete —
      # under a unique key. Next run's restore-keys prefix scan picks
      # up the newest.
      - name: Save churches cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: public/data/churches.geojson
          key: churches-osm-${{ github.run_id }}-${{ github.run_attempt }}

      # Compose the misery index from whatever fetchers succeeded.
      - name: Build misery index
        run: npm run data:misery
        continue-on-error: true

      # Content feeds (YouTube RSS + podcast RSS). Cheap, ~100-200 KB
      # output; refreshed on every deploy and on the daily cron.
      - name: Refresh content feeds
        run: npm run data:feeds
        continue-on-error: true

      - run: npm run build

      - name: Add .nojekyll so Pages serves _vite-generated files
        run: touch dist/.nojekyll

      # enablement: true lets this step turn Pages on itself on the very
      # first run — avoids the manual "Settings → Pages → Source: Actions"
      # step. Requires the `pages: write` permission granted above.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
